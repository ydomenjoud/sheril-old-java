name: Compilation Check

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Compile with javac
      run: |
        mkdir -p out
        find sources -name "*.java" > sources_list.txt
        javac -cp "libs/*" -d out @sources_list.txt
